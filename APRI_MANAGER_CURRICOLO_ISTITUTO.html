<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager Curricolo d'Istituto v3.6</title>
<style>
:root{
  --bg:#f6f7fb;--panel:#fff;--ink:#172033;--muted:#5d6575;--line:#d8deea;
  --primary:#274b8f;--primary2:#eef3ff;--danger:#a12a2a;--ok:#1f7a4d;--warn:#946200;
  --shadow:0 10px 24px rgba(18,33,66,.08);--radius:16px;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;font-size:15px}
a{color:var(--primary)}
header{position:relative;z-index:20;background:linear-gradient(135deg,#1f3f7a,#315da7);color:white;padding:14px 20px;box-shadow:var(--shadow)}
header h1{margin:0;font-size:20px;line-height:1.15}
header p{margin:4px 0 0;color:#dfe8ff;font-size:14px}
.layout{display:grid;grid-template-columns:minmax(220px,250px) minmax(0,1fr)}
nav{background:#101827;color:#dbe5ff;padding:14px;border-right:1px solid #1f2b44;position:sticky;top:0;height:100vh;overflow:auto}
nav .nav-title{font-size:12px;text-transform:uppercase;color:#8ca0c8;margin:14px 0 8px;letter-spacing:.08em}
nav button{width:100%;display:block;text-align:left;border:0;background:transparent;color:#dbe5ff;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:14px}
nav button:hover,nav button.active{background:#263a61;color:white}
main{padding:18px;max-width:100%;overflow:hidden}
section.view{display:none}
section.view.active{display:block}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin-bottom:14px}
.card h2{font-size:22px;margin:0 0 8px}
.card h3{font-size:18px;margin:0 0 8px}
.grid{display:grid;gap:14px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.metric{background:var(--primary2);border:1px solid #cddcff;border-radius:14px;padding:12px}
.metric strong{display:block;font-size:23px;color:var(--primary)}.metric span{font-size:13px;color:#43506a}
label{display:block;font-size:13px;color:#3c465b;margin:8px 0 4px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font:inherit;background:white;color:var(--ink)}
textarea{min-height:90px;resize:vertical}
button.action{border:0;border-radius:9px;background:var(--primary);color:white;padding:8px 11px;cursor:pointer;font-weight:650}
button.action.secondary{background:#eef1f7;color:#172033;border:1px solid var(--line)}
button.action.danger{background:var(--danger)}
button.action.ok{background:var(--ok)}
button.action.mini{padding:5px 8px;font-size:12px;margin:2px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
.table-wrap{width:100%;max-width:100%;overflow:auto;border:1px solid var(--line);border-radius:14px;background:white}
table{border-collapse:collapse;width:100%;min-width:760px}
th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top;font-size:13px}
th{background:#f0f3fa;color:#24324e;position:sticky;top:0;z-index:1}
tr:hover td{background:#fafcff}
.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;background:#eef1f7;color:#253049;border:1px solid #d6dceb}
.badge.ok{background:#eaf7ef;color:#17613b;border-color:#bfe7cf}.badge.warn{background:#fff7e6;color:#7c5100;border-color:#f1d28d}.badge.danger{background:#fff0f0;color:#912828;border-color:#efb5b5}
.small{font-size:12px;color:var(--muted)}.hidden{display:none!important}
.notice{border-left:4px solid var(--primary);background:#f1f5ff;padding:10px 12px;border-radius:10px;margin:12px 0}
.notice.warn{border-color:var(--warn);background:#fff7e6}.notice.danger{border-color:var(--danger);background:#fff0f0}
.kv{display:grid;grid-template-columns:180px 1fr;gap:8px 14px;font-size:14px}.kv div:nth-child(odd){color:var(--muted)}
.statusbar{position:fixed;right:18px;bottom:18px;background:#101827;color:white;padding:10px 14px;border-radius:999px;box-shadow:var(--shadow);font-size:13px;z-index:50}
.statusbar.dirty{background:#8a5a00}.statusbar.saved{background:#17613b}
.empty{color:var(--muted);font-style:italic}
.mobile-menu{display:none}

/* Modal/drawer */
.modal-backdrop{position:fixed;inset:0;background:rgba(8,15,30,.46);z-index:100;display:none;align-items:stretch;justify-content:flex-end}
.modal-backdrop.open{display:flex}
.modal-panel{width:min(720px,100%);height:100%;background:white;box-shadow:-14px 0 40px rgba(0,0,0,.22);padding:0;display:flex;flex-direction:column}
.modal-header{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;justify-content:space-between}
.modal-header h2{font-size:20px;margin:0}
.modal-body{padding:18px;overflow:auto}
.modal-footer{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 14px}
.form-grid .full{grid-column:1/-1}
.required label::after{content:" *";color:var(--danger)}
.field-error{border-color:var(--danger)!important;background:#fff7f7}
.error-list{margin:0 0 12px;padding:10px 12px;border-radius:10px;background:#fff0f0;border-left:4px solid var(--danger);color:#7a1f1f}
.attach-meta{display:block;font-size:12px;color:var(--muted);margin-top:3px}

@media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}.layout{grid-template-columns:210px minmax(0,1fr)}}
@media(max-width:820px){
  header{padding:12px} header h1{font-size:18px} header p{font-size:13px}
  .mobile-menu{display:inline-block}.layout{display:block}
  nav{display:none;position:relative;height:auto;top:0;border-right:0;border-bottom:1px solid #1f2b44}
  body.nav-open nav{display:block}
  main{padding:12px}.grid.cols-2,.grid.cols-4,.form-grid{grid-template-columns:1fr}.kv{grid-template-columns:1fr}
  .table-wrap{border:0;background:transparent}
  table{min-width:0;border-collapse:separate;border-spacing:0 10px}
  thead{display:none}
  tr{display:block;background:white;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:8px;margin-bottom:10px}
  td{display:grid;grid-template-columns:130px 1fr;border:0;padding:6px 8px}
  td::before{content:attr(data-label);font-weight:700;color:#3c465b}
}
@media print{nav,header .toolbar,.no-print,.statusbar,.modal-backdrop{display:none!important}.layout{display:block}main{padding:0}.card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}section.view{display:block!important}}

/* v2.5 matrix editor refinement */
.progress{height:8px;border-radius:999px;background:#e8edf7;overflow:hidden;margin-top:4px}
.progress span{display:block;height:100%;background:var(--primary)}
.matrix-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.matrix-card{border:1px solid var(--line);border-radius:14px;background:white;box-shadow:var(--shadow);padding:14px}
.matrix-card h3{font-size:16px;margin:0 0 8px}
.matrix-card .meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.matrix-card .row{margin:8px 0}
.matrix-card .row strong{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.completion{min-width:120px}
@media(max-width:900px){.matrix-cards{grid-template-columns:1fr}}


/* v2.6 document registry and versioning */
.doc-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.doc-card{border:1px solid var(--line);border-radius:14px;background:white;box-shadow:var(--shadow);padding:14px}
.doc-card h3{font-size:16px;margin:0 0 8px}
.doc-card .meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.doc-card .row{margin:8px 0}
.doc-card .row strong{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.version-chain{font-size:12px;color:var(--muted)}
.version-chain strong{color:var(--ink)}
.status-strip{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:900px){.doc-cards{grid-template-columns:1fr}}


/* v2.7 guide section */
.guide-steps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.guide-step{border:1px solid var(--line);border-radius:14px;background:white;padding:14px;box-shadow:var(--shadow)}
.guide-step strong{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:var(--primary);color:white;margin-right:6px}
.ref-list{display:grid;gap:10px}
.ref-item{border:1px solid var(--line);border-radius:14px;background:white;padding:12px}
.ref-item h3{font-size:15px;margin:0 0 5px}
.ref-item .use{color:var(--muted);font-size:13px}
@media(max-width:1000px){.guide-steps{grid-template-columns:1fr}}


/* v2.8 guided workflow */
.workflow-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.workflow-card{border:1px solid var(--line);border-radius:14px;background:white;box-shadow:var(--shadow);padding:14px}
.workflow-card h3{font-size:17px;margin:0 0 8px}
.workflow-actions{display:grid;gap:8px;margin:10px 0}
.workflow-action{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:start;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fafcff}
.workflow-action.done{background:#eefaf2;border-color:#bfe7cf}
.workflow-output{background:#f7f9fd;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px}
.workflow-note{min-height:70px}
.workflow-status-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
.workflow-mini-progress{height:8px;border-radius:999px;background:#e8edf7;overflow:hidden;margin:8px 0}
.workflow-mini-progress span{display:block;height:100%;background:var(--ok)}
@media(max-width:1000px){.workflow-cards{grid-template-columns:1fr}}


/* v2.9 internal link fix */
.link-tools{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.link-help{font-size:12px;color:var(--muted);margin-top:4px}
.path-pill{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;background:#f1f3f8;border:1px solid var(--line);border-radius:999px;padding:3px 7px;display:inline-block;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


/* v3.0 group delivery / email */
.delivery-panel{border:1px solid var(--line);border-radius:14px;background:white;box-shadow:var(--shadow);padding:15px}
.delivery-preview{background:#f7f9fd;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;white-space:pre-wrap}
.delivery-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.delivery-step{background:#eef3ff;border:1px solid #cddcff;border-radius:14px;padding:12px}
.delivery-step strong{display:block;color:var(--primary);font-size:18px}
@media(max-width:1000px){.delivery-steps{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.delivery-steps{grid-template-columns:1fr}}


/* v3.1 locale Italia, autosave e portabilità */
#manualSaveBtn.save-attention{background:#fff7e6;color:#7c5100;border-color:#f1c45e;box-shadow:0 0 0 3px rgba(241,196,94,.28)}
.statusbar.autosaving{background:#274b8f}
.statusbar.dirty{background:#8a5a00}
.statusbar.saved{background:#17613b}
.autosave-card{border-left:4px solid var(--ok);background:#f1fbf5}
.portable-card{border-left:4px solid var(--primary);background:#f3f7ff}
.save-pill{display:inline-block;border-radius:999px;padding:3px 8px;background:#eaf7ef;border:1px solid #bfe7cf;color:#17613b;font-size:12px}


/* v3.2 sessione di lavoro guidata */
.session-hero{background:linear-gradient(135deg,#eef3ff,#f7fbff);border:1px solid #cddcff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.session-steps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:12px 0}
.session-step{border:1px solid var(--line);border-radius:14px;background:white;padding:14px;box-shadow:var(--shadow)}
.session-step.done{border-color:#bfe7cf;background:#f1fbf5}
.session-step.active{border-color:#9db7ee;background:#f3f7ff;box-shadow:0 0 0 3px rgba(39,75,143,.12)}
.session-step h3{font-size:16px;margin:0 0 6px}
.session-step-number{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:var(--primary);color:#fff;font-weight:700;margin-right:6px}
.session-progress{height:10px;border-radius:999px;background:#e8edf7;overflow:hidden;margin:10px 0}
.session-progress span{display:block;height:100%;background:var(--ok)}
.session-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.session-summary .box{background:white;border:1px solid var(--line);border-radius:12px;padding:10px}
@media(max-width:1000px){.session-steps{grid-template-columns:1fr}.session-summary{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.session-summary{grid-template-columns:1fr}}


/* v3.3 ui ambiti e ruoli */
.scope-card{border-left:4px solid var(--primary);background:#f3f7ff}
.scope-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.scope-pill{display:inline-block;border-radius:999px;background:#eef3ff;border:1px solid #cddcff;color:#274b8f;padding:4px 9px;font-size:12px}
.path-option{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;margin:8px 0}
.path-option input{width:auto}
.role-warning{background:#fff7e6;border-left:4px solid #946200;border-radius:10px;padding:10px 12px;margin:10px 0}
.simple-help{color:#4e5a70;font-size:14px}


/* MGR-025 institutional document templates */
.institutional-template-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:12px}
.institutional-template-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:14px;box-shadow:var(--shadow)}
.institutional-template-card h3{margin:0 0 6px;font-size:17px;color:#182033}
.institutional-template-card .template-meta{font-size:12px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 10px}
.institutional-template-card .template-sections{font-size:13px;color:#3f4b5f;margin:8px 0 10px}
.document-quality-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:10px}
.document-quality-list div{border:1px solid var(--line);border-radius:12px;background:#fafcff;padding:10px;font-size:13px}
@media(max-width:1000px){.institutional-template-grid,.document-quality-list{grid-template-columns:1fr}}


</style>
</head>
<body>
<header>
  <h1 id="appTitle">Manager Curricolo d'Istituto v3.6</h1>
  <p id="appSubtitle">Uno spazio di lavoro locale, compatto e guidato, per aggiornare il curricolo, gestire i documenti e seguire le decisioni senza perdersi.</p>
  <div class="toolbar no-print">
    <button class="action secondary mobile-menu" onclick="toggleSidebar()">☰ Menu</button>
    <button id="manualSaveBtn" class="action secondary" onclick="saveNow('manual')">Salva ora</button>
    <button class="action secondary" onclick="exportPortableSession()">Esporta sessione</button>
    <button class="action secondary" onclick="exportJson()">Esporta backup</button>
    <button class="action secondary" onclick="document.getElementById('importJsonInput').click()">Importa backup/sessione</button>
    <button class="action secondary" onclick="window.print()">Stampa pagina/PDF</button>
    <button class="action secondary" onclick="exportDocument('curricolo','print')">Report completo PDF</button>
    <button class="action secondary" onclick="exportDocument('curricolo','word')">Report completo Word</button>
    <button class="action secondary" onclick="exportDocument('curricolo','docx')">Report completo DOCX</button>
    <button class="action secondary" onclick="exportDocument('istituzionale:report_curricolo_istituto','print')">Report istituzionale PDF</button>
    <button class="action secondary" onclick="exportDocument('istituzionale:report_curricolo_istituto','docx')">Report istituzionale DOCX</button>
    <button class="action secondary" onclick="exportAttachmentsZip()">ZIP allegati</button>
    <button class="action secondary" onclick="exportCompleteAttachmentPackage()">Pacchetto completo ZIP</button>
    <button class="action secondary" onclick="document.getElementById('importAttachmentPackageInput').click()">Importa pacchetto ZIP</button>
    <input id="importJsonInput" class="hidden" type="file" accept="application/json,.json" onchange="importJson(event)">
    <input id="attachDocInput" class="hidden" type="file" onchange="handleAttachFile(event)">
    <input id="importAttachmentPackageInput" class="hidden" type="file" accept=".zip,application/zip" onchange="importCompleteAttachmentPackage(event)">
    <input id="importInstitutionalTemplatesInput" class="hidden" type="file" accept="application/json,.json" onchange="importInstitutionalTemplates(event)">
  </div>
</header>

<div class="layout">
<nav id="sidebar" class="no-print">
  <div class="nav-title">Governo</div>
  <button data-view="dashboard" class="active">Dashboard</button>
  <button data-view="guida">Guida</button>
  <button data-view="istituto">Impostazioni Istituto</button>
  <button data-view="fonti">Riferimenti comuni</button>
  <button data-view="documenti">Documenti</button>
  <button data-view="documentiIstituzionali">Documenti istituzionali</button>
  <button data-view="modelliSorgente">Modelli sorgente</button>
  <button data-view="matrice">Proposte di aggiornamento</button>
  <button data-view="workflow">Giornate di lavoro</button>
  <button data-view="sessione">Sessione lavoro</button>
  <button data-view="gruppi">Consegne dei gruppi</button>
  <button data-view="decisioni">Decisioni del gruppo</button>
  <div class="nav-title">Livelli</div>
  <button data-view="infanzia">Scuola dell'infanzia</button>
  <button data-view="primaria">Scuola primaria</button>
  <button data-view="secondaria">Secondaria I grado</button>
  <button data-view="discipline">Discipline / campi</button>
  <div class="nav-title">Sezioni specifiche</div>
  <button data-view="tecnologia">Tecnologia</button>
  <button data-view="strumenti">Salvataggio e controlli</button>
</nav>
<main>
  <section id="dashboard" class="view active"></section>
  <section id="guida" class="view"></section>
  <section id="istituto" class="view"></section>
  <section id="fonti" class="view"></section>
  <section id="documenti" class="view"></section>
  <section id="documentiIstituzionali" class="view"></section>
  <section id="modelliSorgente" class="view"></section>
  <section id="matrice" class="view"></section>
  <section id="workflow" class="view"></section>
  <section id="sessione" class="view"></section>
  <section id="gruppi" class="view"></section>
  <section id="decisioni" class="view"></section>
  <section id="infanzia" class="view"></section>
  <section id="primaria" class="view"></section>
  <section id="secondaria" class="view"></section>
  <section id="discipline" class="view"></section>
  <section id="tecnologia" class="view"></section>
  <section id="strumenti" class="view"></section>
</main>
</div>

<div id="statusbar" class="statusbar saved">Dati caricati</div>

<div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="modalTitle">Modifica</h2>
      <button class="action secondary" onclick="closeModal()">Chiudi</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-footer">
      <button class="action secondary" onclick="closeModal()">Annulla</button>
      <button id="modalSave" class="action ok" onclick="saveModal()">Salva</button>
    </div>
  </div>

<script>
const STORAGE_KEY = "manager_curricolo_istituto_v3_6";
const FILE_DB_NAME = "manager_curricolo_istituto_v3_6_files";
const FILE_STORE = "files";
let state = loadInitialState();
let dirty = false;
let modalContext = null;
let pendingAttachDocId = null;
let autosaveTimer = null;
let autosaveInFlight = false;
let lastSavedAt = null;

function loadInitialState(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try { return JSON.parse(saved); } catch(e) { console.warn("Backup locale corrotto, uso seed", e); }
  }
  return JSON.parse(document.getElementById("seed-data").textContent);
}
function esc(value){return String(value ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function jsAttr(value){return String(value ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," ");}
function normalizeLocalHref(path){
 let p=String(path||"").trim();
 if(!p)return "";
 if(/^https?:\/\//i.test(p) || /^file:/i.test(p)) return encodeURI(p);
 if(p.startsWith("./")) p=p.slice(2);
 return encodeURI(p);
}
function openInternalLink(path){
 const href=normalizeLocalHref(path);
 if(!href){toast("Percorso non disponibile.");return;}
 try{
  const a=document.createElement("a");
  a.href=href;
  a.target="_blank";
  a.rel="noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();
  toast("Apertura file richiesta.");
 }catch(e){
  copyText(path);
  alert("Non riesco ad aprire automaticamente il file. Ho copiato il percorso: aprilo dalla cartella estratta del pacchetto.");
 }
}
function openExternalLink(url){
 if(!url){toast("Link non disponibile.");return;}
 window.open(url,"_blank","noopener");
}
async function copyText(text){
 try{
  await navigator.clipboard.writeText(String(text||""));
  toast("Percorso/link copiato.");
 }catch(e){
  const tmp=document.createElement("textarea");
  tmp.value=String(text||"");
  document.body.appendChild(tmp);
  tmp.select();
  document.execCommand("copy");
  tmp.remove();
  toast("Percorso/link copiato.");
 }
}

function safeId(text){return String(text||"item").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,60) || ("item_"+Date.now());}
function byId(arr,id){return (arr||[]).find(x => x.id === id);}
function setDirty(value=true){
 dirty=value;
 updateSaveUi(value ? "dirty" : "saved");
 if(value) scheduleAutosave();
}
function saveNow(mode="manual"){
 if(autosaveTimer){clearTimeout(autosaveTimer);autosaveTimer=null;}
 try{
  autosaveInFlight = true;
  updateSaveUi("autosaving");
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  lastSavedAt = new Date();
  dirty = false;
  autosaveInFlight = false;
  updateSaveUi("saved");
  toast(mode === "autosave" ? `Autosave completato alle ${formatTime(lastSavedAt)}.` : `Salvato alle ${formatTime(lastSavedAt)}.`);
 }catch(e){
  autosaveInFlight = false;
  updateSaveUi("dirty");
  alert("Salvataggio nel browser non riuscito. Esporta subito la sessione JSON per non perdere il lavoro.");
 }
}
function toast(msg){
 const b=document.getElementById("statusbar");
 b.textContent=msg;
 setTimeout(()=>{updateSaveUi(dirty ? "dirty" : "saved");},2200);
}
function scheduleAutosave(){
 const delay = Number(state.autosave?.delayMs || 1200);
 if(autosaveTimer) clearTimeout(autosaveTimer);
 updateSaveUi("dirty");
 autosaveTimer = setTimeout(()=>saveNow("autosave"), delay);
}
function updateSaveUi(status){
 const b=document.getElementById("statusbar");
 const btn=document.getElementById("manualSaveBtn");
 if(!b)return;
 if(status==="dirty"){
  b.className="statusbar dirty";
  b.textContent="Modifiche non salvate · autosave tra poco · puoi cliccare Salva ora";
  if(btn) btn.classList.add("save-attention");
 }else if(status==="autosaving"){
  b.className="statusbar autosaving";
  b.textContent="Autosave in corso...";
  if(btn) btn.classList.add("save-attention");
 }else{
  b.className="statusbar saved";
  b.textContent=lastSavedAt ? `Salvato alle ${formatTime(lastSavedAt)} nel browser di questo PC` : "Autosave attivo · nessuna modifica da salvare";
  if(btn) btn.classList.remove("save-attention");
 }
}
function formatTime(value){
 try{return new Intl.DateTimeFormat(state.locale || "it-IT",{hour:"2-digit",minute:"2-digit"}).format(value instanceof Date ? value : new Date(value));}
 catch(e){return String(value||"");}
}
function defaultInstitutionalDocumentModels(){return JSON.parse(document.getElementById("seed-data").textContent).modelliDocumentoIstituzionale || [];}
function defaultInstitutionalDocumentRules(){return JSON.parse(document.getElementById("seed-data").textContent).regoleDocumentaliIstituzionali || {versione:"1.0",principi:[],formati:[]};}
function ensureRuntimeDefaults(){
 state.locale = state.locale || "it-IT";
 state.autosave = state.autosave || {enabled:true,delayMs:1200};
 if(!Array.isArray(state.modelliDocumentoIstituzionale) || !state.modelliDocumentoIstituzionale.length) state.modelliDocumentoIstituzionale = defaultInstitutionalDocumentModels();
 if(!state.regoleDocumentaliIstituzionali) state.regoleDocumentaliIstituzionali = defaultInstitutionalDocumentRules();
}

function ensureScopeDefaults(){
 if(!state.uiScope) state.uiScope={ruolo:"docente_gruppo",ordine:"",discipline:[],nomeGruppo:"",modalita:"ambito_selezionato"};
 if(!Array.isArray(state.uiScope.discipline)) state.uiScope.discipline = state.uiScope.discipline ? [state.uiScope.discipline] : [];
}
function hasFullAccess(){
 const r=state.uiScope?.ruolo || "docente_gruppo";
 return r==="admin" || r==="coordinatore";
}
function currentScopeLabel(){
 ensureScopeDefaults();
 const ruolo=(state.ruoliApplicazione||[]).find(r=>r.id===state.uiScope.ruolo)?.nome || "Docente / gruppo";
 const ordine=state.uiScope.ordine ? (byId(state.ordiniScuola,state.uiScope.ordine)?.nome || state.uiScope.ordine) : (hasFullAccess() ? "tutti gli ordini" : "nessun ordine scelto");
 const disc=(state.uiScope.discipline||[]).length ? (state.uiScope.discipline||[]).map(id=>byId(state.discipline,id)?.nome || id).join(", ") : (hasFullAccess() ? "tutte le discipline" : "nessuna disciplina scelta");
 return `${ruolo} · ${ordine} · ${disc}`;
}
function isInScopeDiscipline(d){
 if(hasFullAccess()) return true;
 ensureScopeDefaults();
 const orderOk=!state.uiScope.ordine || d.ordine===state.uiScope.ordine || d.ordine==="trasversale";
 const discOk=!(state.uiScope.discipline||[]).length || (state.uiScope.discipline||[]).includes(d.id);
 return orderOk && discOk;
}
function isInScopeMatrice(r){
 if(hasFullAccess()) return true;
 ensureScopeDefaults();
 const orderOk=!state.uiScope.ordine || r.ordine===state.uiScope.ordine;
 const discOk=!(state.uiScope.discipline||[]).length || (state.uiScope.discipline||[]).includes(r.disciplinaCampo);
 return orderOk && discOk;
}
function isCommonDoc(d){
 return d.ambito==="generale" || d.tipo==="guida" || (d.collegatoA||[]).includes("guida") || (d.collegatoA||[]).includes("fonti_generali");
}
function isInScopeDocument(d){
 if(hasFullAccess()) return true;
 ensureScopeDefaults();
 if(isCommonDoc(d)) return true;
 const order=state.uiScope.ordine;
 const discs=state.uiScope.discipline || [];
 const orderOk=!order || d.ambito===order || (d.collegatoA||[]).some(x=>String(x).includes(order));
 const discOk=!discs.length || discs.some(id => d.ambito===id || (d.collegatoA||[]).includes(id) || (id.includes("tecnologia") && d.ambito==="tecnologia"));
 return orderOk && discOk;
}
function scopeFilterDocuments(rows){ return (rows||[]).filter(isInScopeDocument); }
function scopeFilterMatrice(rows){ return (rows||[]).filter(isInScopeMatrice); }
function scopeFilterDiscipline(rows){ return (rows||[]).filter(isInScopeDiscipline); }
function renderScopeCard(){
 ensureScopeDefaults();
 return `<div class="card scope-card"><h3>Ambito di lavoro</h3><p class="simple-help">Scegli chi sta usando lo strumento e su quale parte del curricolo lavora. Così il Manager mostra solo ciò che serve.</p>
 <div class="form-grid">
  <div><label>Ruolo</label><select onchange="updateScopeField('ruolo',this.value)">${(state.ruoliApplicazione||[]).map(r=>`<option value="${esc(r.id)}" ${state.uiScope.ruolo===r.id?"selected":""}>${esc(r.nome)}</option>`).join("")}</select></div>
  <div><label>Nome docente / gruppo</label><input value="${esc(state.uiScope.nomeGruppo||"")}" onchange="updateScopeField('nomeGruppo',this.value)" placeholder="es. Gruppo Tecnologia"></div>
  <div><label>Ordine di scuola</label><select onchange="updateScopeField('ordine',this.value)"><option value="">${hasFullAccess()?"Tutti":"Scegli ordine"}</option>${(state.ordiniScuola||[]).map(o=>`<option value="${esc(o.id)}" ${state.uiScope.ordine===o.id?"selected":""}>${esc(o.nome)}</option>`).join("")}</select></div>
  <div><label>Disciplina / campo</label><select onchange="updateScopeDiscipline(this.value)"><option value="">${hasFullAccess()?"Tutte":"Scegli disciplina/campo"}</option>${(state.discipline||[]).filter(d=>!state.uiScope.ordine || d.ordine===state.uiScope.ordine || d.ordine==="trasversale").map(d=>`<option value="${esc(d.id)}" ${(state.uiScope.discipline||[]).includes(d.id)?"selected":""}>${esc(d.nome)} — ${esc(d.ordine)}</option>`).join("")}</select></div>
 </div>
 <p><span class="scope-pill">${esc(currentScopeLabel())}</span></p>
 ${!hasFullAccess() && (!state.uiScope.ordine && !(state.uiScope.discipline||[]).length) ? '<div class="role-warning">Scegli almeno un ordine o una disciplina: in modalità docente/gruppo il Manager non deve mostrare tutto.</div>' : ''}
 </div>`;
}
function updateScopeField(field,value){
 ensureScopeDefaults();
 state.uiScope[field]=value;
 if(field==="ruolo" && (value==="admin" || value==="coordinatore")){state.uiScope.ordine="";state.uiScope.discipline=[];}
 if(field==="ordine"){state.uiScope.discipline=[];}
 setDirty(true);
 saveNow("manual");
 updateNavigationVisibility();
 renderAll();
}
function updateScopeDiscipline(value){
 ensureScopeDefaults();
 state.uiScope.discipline=value?[value]:[];
 setDirty(true);
 saveNow("manual");
 updateNavigationVisibility();
 renderAll();
}
function updateNavigationVisibility(){
 ensureScopeDefaults();
 const all=hasFullAccess();
 const order=state.uiScope.ordine || "";
 const discs=state.uiScope.discipline || [];
 document.querySelectorAll('nav button[data-view]').forEach(btn=>{
  const v=btn.dataset.view;
  let show=true;
  if(!all && ["strumenti","decisioni","discipline"].includes(v)) show=false;
  if(!all && ["infanzia","primaria","secondaria"].includes(v)){
    const map={infanzia:"infanzia",primaria:"primaria",secondaria:"secondaria_i_grado"};
    show=!!order && order===map[v];
  }
  if(!all && v==="tecnologia") show=discs.some(d=>String(d).includes("tecnologia"));
  btn.style.display=show?"block":"none";
 });
}
function scopedEmptyMessage(kind){
 return `<div class="notice warn">Stai lavorando come <strong>${esc(currentScopeLabel())}</strong>. Qui vedi solo ciò che riguarda l'ambito scelto. Per vedere tutto serve ruolo Coordinatore o Amministratore.</div>`;
}

function toggleSidebar(){document.body.classList.toggle("nav-open");}
window.addEventListener("beforeunload", e => { if(dirty){ e.preventDefault(); e.returnValue=""; }});
document.querySelectorAll("nav button[data-view]").forEach(btn => btn.addEventListener("click",()=>showView(btn.dataset.view)));
function showView(id){document.querySelectorAll("nav button[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view===id));document.querySelectorAll("section.view").forEach(s=>s.classList.toggle("active",s.id===id));document.body.classList.remove("nav-open");renderView(id);}
function renderView(id){({dashboard:renderDashboard,guida:renderGuida,istituto:renderIstituto,fonti:renderFonti,documenti:renderDocumenti,documentiIstituzionali:renderDocumentiIstituzionali,modelliSorgente:renderModelliSorgenteIstituzionali,matrice:renderMatrice,workflow:renderWorkflow,sessione:renderSessione,gruppi:renderGruppi,decisioni:renderDecisioni,infanzia:()=>renderOrdine("infanzia"),primaria:()=>renderOrdine("primaria"),secondaria:()=>renderOrdine("secondaria_i_grado"),discipline:renderDiscipline,tecnologia:renderTecnologia,strumenti:renderStrumenti}[id]||renderDashboard)();}
function renderAll(){ensureScopeDefaults();document.getElementById("appSubtitle").textContent = `${state.istituto.denominazione || "Istituto"} · ${state.istituto.annoScolastico || ""} · ${currentScopeLabel()}`;updateNavigationVisibility();renderView(document.querySelector("section.view.active")?.id || "dashboard");}
function badge(value){const v=String(value??"");const cls=["canonico","validata","approvato"].includes(v)?"ok":(["alta","urgente","da_verificare","aperta","in_revisione"].includes(v)?"warn":"");return `<span class="badge ${cls}">${esc(v||"-")}</span>`;}
function renderLink(local, external){
 const a=[];
 if(local){
  a.push(`<div class="link-tools"><button type="button" class="action secondary mini" onclick="openInternalLink('${jsAttr(local)}')">Apri file</button><button type="button" class="action secondary mini" onclick="copyText('${jsAttr(local)}')">Copia percorso</button></div><span class="path-pill" title="${esc(local)}">${esc(local)}</span>`);
 }
 if(external){
  a.push(`<div class="link-tools"><button type="button" class="action secondary mini" onclick="openExternalLink('${jsAttr(external)}')">Apri link</button><button type="button" class="action secondary mini" onclick="copyText('${jsAttr(external)}')">Copia link</button></div>`);
 }
 return a.join(" ") || "-";
}

function openModal(title, kind, mode, index, bodyHtml, saveLabel="Salva"){
  // MGR-020: compatibility guard for existing form callers.
  // Some edit/add forms call openModal(title, kind, index, bodyHtml).
  // Without this guard the bodyHtml argument is undefined and the modal shows "undefined".
  if(bodyHtml === undefined && typeof index === "string"){
    bodyHtml = index;
    index = mode ?? null;
    mode = kind;
  }
  modalContext={kind,mode,index};
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=bodyHtml ?? "";
  document.getElementById("modalSave").textContent=saveLabel;
  document.getElementById("modal").classList.add("open");
  const first=document.querySelector("#modalBody input,#modalBody textarea,#modalBody select");
  if(first) setTimeout(()=>first.focus(),50);
}

function versionChain(d){

 const sostDa=d.sostituitoDa?`<div> Sostituito da documento successivo: <strong>${esc(d.sostituitoDa)}</strong></div>`:"";

function openDocumentoFormById(id){const index=(state.documenti||[]).findIndex(d=>d.id===id);if(index>=0)openDocumentoForm(index);}
function openNewVersionForm(id){
 const source=(state.documenti||[]).find(d=>d.id===id);
 if(!source)return;
 const copy=JSON.parse(JSON.stringify(source));
 copy.id=id+"_v"+Date.now();
 copy.titolo=source.titolo+" — nuova versione";
 copy.versione=nextVersionLabel(source.versione);
 copy.stato="bozza";
 copy.canonico=false;
 copy.sostituisce=[source.id];
 copy.sostituitoDa="";
 copy.dataAggiornamento=new Date().toISOString().slice(0,10);
 copy.noteVersione="Nuova versione derivata da "+source.id;
 state.documenti.push(copy);
 source.sostituitoDa=copy.id;
 if(source.stato==="canonico")source.stato="storico";
 source.canonico=false;
 setDirty(true);
 saveNow();
 renderDocumenti();
}
function nextVersionLabel(v){
 const m=String(v||"v1.0").match(/v?(\d+)(?:\.(\d+))?/i);
 if(!m)return "v2.0";
 const major=Number(m[1]||1), minor=Number(m[2]||0);
 return "v"+major+"."+(minor+1);
}
function markDocumentSuperseded(id){

 saveNow();
 renderDocumenti();
}

 const step=state.sessioneAttiva.steps[idx];
 if(step){step.done=true;step.completedAt=new Date().toISOString();}
 const next=state.sessioneAttiva.steps.findIndex((p,i)=>i>idx && !p.done);
 state.sessioneAttiva.activeStep=next>=0?next:idx;
 setDirty(true);
 saveNow("manual");
 renderSessione();
}
function completeActiveSessionStep(){
 if(!state.sessioneAttiva)return;
 completeSessionStep(state.sessioneAttiva.activeStep || 0);
}
function goSessionSection(){
 if(!state.sessioneAttiva)return;
 const step=state.sessioneAttiva.steps[state.sessioneAttiva.activeStep || 0];
 if(step?.sezione) showView(step.sezione);
}
function updateSessionNotes(value){
 if(!state.sessioneAttiva)return;
 state.sessioneAttiva.notes=value;
 setDirty(true);
}
function closeWorkSession(){
 if(!state.sessioneAttiva)return;
 state.sessioneAttiva.status="chiusa";
 state.sessioneAttiva.endedAt=new Date().toISOString();
 exportWorkSessionReport();
 state.sessioneAttiva=null;
 setDirty(true);
 saveNow("manual");
 renderSessione();
}

 downloadBlob(new Blob([html],{type:"text/html;charset=utf-8"}),`report_sessione_${istituto}_${stamp}.html`);
}

function renderWorkflow(){
 ensureWorkflowProgress();
 const metrics = calcWorkflowMetrics();
 const filter = sessionStorage.getItem("workflow_filter_status") || "";
 const items = (state.workflow || []).filter(w => !filter || (state.workflowProgress[w.id]?.stato || "da_avviare") === filter);
 document.getElementById("workflow").innerHTML=`<div class="card"><h2>Workflow guidato</h2>
 <p>Qui il cronoprogramma diventa una sequenza di azioni spuntabili. Serve per condurre la sessione di lavoro senza perdere passaggi.</p>
 <div class="grid cols-4">
  <div class="metric"><strong>${metrics.total}</strong><span>Giornate/step</span></div>
  <div class="metric"><strong>${metrics.completed}</strong><span>Completati</span></div>
  <div class="metric"><strong>${metrics.inProgress}</strong><span>In corso</span></div>
  <div class="metric"><strong>${metrics.percent}%</strong><span>Avanzamento</span></div>
 </div>
 <div class="toolbar">
  <label>Stato <select onchange="sessionStorage.setItem('workflow_filter_status',this.value);renderWorkflow()">
   <option value="">Tutti</option>
   ${["da_avviare","in_corso","completato","rinviato"].map(s=>`<option value="${s}" ${filter===s?"selected":""}>${s}</option>`).join("")}
  </select></label>
  <button class="action secondary" onclick="clearWorkflowFilter()">Pulisci filtro</button>
  <button class="action secondary" onclick="exportWorkflowReport()">Esporta CSV workflow</button>
  <button class="action secondary" onclick="exportDocument('workflow','print')">Stampa/PDF</button>
  <button class="action secondary" onclick="exportDocument('workflow','word')">Word</button><button class="action secondary" onclick="exportDocument('workflow','docx')">DOCX</button>
 </div>
 <div class="notice">Suggerimento: apri una giornata, spunta le azioni completate, aggiungi note rapide e salva. A fine sessione esporta JSON o report workflow.</div>
 ${cardsWorkflow(items)}
 </div>`;
}
function cardsWorkflow(items){
 if(!items.length)return`<p class="empty">Nessuna giornata con il filtro corrente.</p>`;
 return `<div class="workflow-cards">${items.map(w => workflowCard(w)).join("")}</div>`;
}
function workflowCard(w){
 const p = state.workflowProgress[w.id] || {};
 const completed = countWorkflowDone(w.id);
 const total = (w.azioniManager || []).length;
 const pct = total ? Math.round((completed/total)*100) : 0;
 return `<article class="workflow-card">
  <h3>${esc(w.titolo)}</h3>
  <div class="workflow-status-row">${badge(w.data)} ${badge(p.stato || "da_avviare")} <span class="badge">${completed}/${total} azioni</span></div>
  <div class="workflow-mini-progress"><span style="width:${pct}%"></span></div>
  <div class="workflow-actions">
   ${(w.azioniManager || []).map((a,idx)=>workflowAction(w.id, idx, a)).join("")}
  </div>
  <div class="workflow-output"><strong>Output atteso</strong><br>${esc(w.outputAtteso || "-")}</div>
  <label>Responsabile / gruppo <input value="${esc(p.responsabile || "")}" onchange="updateWorkflowField('${esc(w.id)}','responsabile',this.value)"></label>
  <label>Note rapide <textarea class="workflow-note" onchange="updateWorkflowField('${esc(w.id)}','noteLavoro',this.value)">${esc(p.noteLavoro || "")}</textarea></label>
  <div class="toolbar">
   <button class="action secondary mini" onclick="setWorkflowStatus('${esc(w.id)}','da_avviare')">Da avviare</button>
   <button class="action secondary mini" onclick="setWorkflowStatus('${esc(w.id)}','in_corso')">In corso</button>
   <button class="action ok mini" onclick="completeWorkflow('${esc(w.id)}')">Completa</button>
   <button class="action danger mini" onclick="setWorkflowStatus('${esc(w.id)}','rinviato')">Rinvia</button>
  </div>
 </article>`;
}
function workflowAction(workflowId, idx, text){
 const done = !!state.workflowProgress?.[workflowId]?.azioniCompletate?.[String(idx)];
 return `<label class="workflow-action ${done?"done":""}"><input type="checkbox" ${done?"checked":""} onchange="toggleWorkflowAction('${esc(workflowId)}','${idx}',this.checked)"> <span>${esc(text)}</span></label>`;
}
function ensureWorkflowProgress(){
 if(!state.workflowProgress)state.workflowProgress={};
 for(const w of state.workflow || []){
  if(!state.workflowProgress[w.id])state.workflowProgress[w.id]={stato:"da_avviare",azioniCompletate:{},noteLavoro:"",responsabile:"",ultimoAggiornamento:""};
  if(!state.workflowProgress[w.id].azioniCompletate)state.workflowProgress[w.id].azioniCompletate={};
  (w.azioniManager || []).forEach((_,idx)=>{
   if(state.workflowProgress[w.id].azioniCompletate[String(idx)] === undefined)state.workflowProgress[w.id].azioniCompletate[String(idx)] = false;
  });
 }
}
function countWorkflowDone(id){
 ensureWorkflowProgress();
 return Object.values(state.workflowProgress[id]?.azioniCompletate || {}).filter(Boolean).length;
}
function calcWorkflowMetrics(){
 ensureWorkflowProgress();
 const total=(state.workflow||[]).length;
 const completed=(state.workflow||[]).filter(w=>(state.workflowProgress[w.id]?.stato)==="completato").length;
 const inProgress=(state.workflow||[]).filter(w=>(state.workflowProgress[w.id]?.stato)==="in_corso").length;
 const totalActions=(state.workflow||[]).reduce((s,w)=>s+(w.azioniManager||[]).length,0);
 const doneActions=(state.workflow||[]).reduce((s,w)=>s+countWorkflowDone(w.id),0);
 return {total,completed,inProgress,percent:totalActions?Math.round((doneActions/totalActions)*100):0};
}
function toggleWorkflowAction(id, idx, checked){
 ensureWorkflowProgress();
 state.workflowProgress[id].azioniCompletate[String(idx)] = checked;
 if(checked && state.workflowProgress[id].stato === "da_avviare") state.workflowProgress[id].stato = "in_corso";
 state.workflowProgress[id].ultimoAggiornamento = new Date().toISOString();
 setDirty(true);
 saveNow();
 renderWorkflow();
}
function updateWorkflowField(id, field, value){
 ensureWorkflowProgress();
 state.workflowProgress[id][field] = value;
 state.workflowProgress[id].ultimoAggiornamento = new Date().toISOString();
 setDirty(true);
}
function setWorkflowStatus(id, status){
 ensureWorkflowProgress();
 state.workflowProgress[id].stato = status;
 state.workflowProgress[id].ultimoAggiornamento = new Date().toISOString();
 setDirty(true);
 saveNow();
 renderWorkflow();
}
function completeWorkflow(id){
 ensureWorkflowProgress();
 const w=(state.workflow||[]).find(x=>x.id===id);
 (w?.azioniManager||[]).forEach((_,idx)=>state.workflowProgress[id].azioniCompletate[String(idx)] = true);
 state.workflowProgress[id].stato = "completato";
 state.workflowProgress[id].ultimoAggiornamento = new Date().toISOString();
 setDirty(true);
 saveNow();
 renderWorkflow();
}
function clearWorkflowFilter(){sessionStorage.removeItem("workflow_filter_status");renderWorkflow();}
function exportWorkflowReport(){
 ensureWorkflowProgress();
 const rows=(state.workflow||[]).map(w=>{
  const p=state.workflowProgress[w.id]||{};
  return {id:w.id,data:w.data,titolo:w.titolo,stato:p.stato||"da_avviare",azioniCompletate:countWorkflowDone(w.id),azioniTotali:(w.azioniManager||[]).length,responsabile:p.responsabile||"",note:p.noteLavoro||"",outputAtteso:w.outputAtteso||"",ultimoAggiornamento:p.ultimoAggiornamento||""};
 });
 downloadBlob(new Blob([toCsv(rows)],{type:"text/csv;charset=utf-8"}),"workflow_guidato_curricolo.csv");
}

function makeDeliveryFilename(sel, ext){
 const istituto=safeId(state.istituto?.codiceMeccanografico || state.istituto?.denominazione || "istituto");
 const order=safeId(sel.order || "tutti_ordini");
 const disc=safeId(sel.discipline || sel.type || "sezione");
 const author=safeId(sel.author || "gruppo");
 const stamp=new Date().toISOString().slice(0,16).replace(/[-:T]/g,"");
 return `curricolo_${istituto}_${order}_${disc}_${author}_${stamp}.${ext}`;
}
function buildGroupDelivery(sel){
 const docs=(state.documenti||[]).filter(d=>{
  if(sel.type==="fonti") return d.ambito==="generale" && (d.tipo||"").includes("fonte");
  if(sel.type==="documenti") return (!sel.order || d.ambito===sel.order || (d.collegatoA||[]).some(x=>String(x).includes(sel.order))) && (!sel.discipline || (d.collegatoA||[]).includes(sel.discipline) || d.ambito===sel.discipline);
  if(sel.type==="workflow") return false;
  return (!sel.order || d.ambito===sel.order || (d.collegatoA||[]).some(x=>String(x).includes(sel.order))) && (!sel.discipline || (d.collegatoA||[]).includes(sel.discipline) || d.ambito===sel.discipline || d.ambito==="tecnologia" && String(sel.discipline).includes("tecnologia"));
 });
 const matrice=(state.matriciRevisione||[]).filter(r=>(!sel.order||r.ordine===sel.order)&&(!sel.discipline||r.disciplinaCampo===sel.discipline));
 const discipline=(state.discipline||[]).filter(d=>(!sel.order||d.ordine===sel.order)&&(!sel.discipline||d.id===sel.discipline));
 const workflow=sel.type==="workflow" ? (state.workflow||[]).map(w=>({ ...w, progress: state.workflowProgress?.[w.id] || null })) : [];
 return {
  schema:"manager-curricolo-section-delivery",
  schemaVersion:"1.0",
  generatedAt:new Date().toISOString(),
  locale: state.locale || "it-IT",
  istituto: state.istituto || {},
  selection: sel,
  summary: {
   documenti: docs.length,
   matrice: matrice.length,
   discipline: discipline.length,
   workflow: workflow.length
  },
  discipline,
  documenti: docs,
  matriceRevisione: matrice,
  workflow,
  noteConsegna: sel.notes
 };
}

 const body=`Buongiorno,

function importGroupDelivery(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=()=>{
  try{
   const incoming=JSON.parse(reader.result);
   if(incoming.modello!=="manager-curricolo-section-delivery") throw new Error("File consegna non riconosciuto.");
   mergeById("discipline", incoming.discipline || []);
   mergeById("documenti", incoming.documenti || []);
   mergeById("matriciRevisione", incoming.matriceRevisione || []);
   setDirty(true);
   saveNow();
   renderAll();
   alert("File sezione importato. Controlla Matrice e Documenti.");
  }catch(e){alert("Importazione file sezione fallita: "+e.message);}
 };
 reader.readAsText(file,"utf-8");
 event.target.value="";
}
function mergeById(key, items){
 if(!state[key])state[key]=[];
 for(const item of items){
  if(!item || !item.id)continue;
  const idx=state[key].findIndex(x=>x.id===item.id);
  if(idx>=0)state[key][idx]=item; else state[key].push(item);
 }
}
function formatDateTime(value){
 try{return new Intl.DateTimeFormat(state.locale||"it-IT",{dateStyle:"short",timeStyle:"short"}).format(new Date(value));}
 catch(e){return String(value||"");}
}

/* Attachments */
function ensureAttachments(){if(!state.allegati)state.allegati={};}
function humanFileSize(bytes){const n=Number(bytes||0);if(n<1024)return n+" B";if(n<1024*1024)return(n/1024).toFixed(1)+" KB";return(n/1024/1024).toFixed(1)+" MB";}
function attachmentCell(docId){ensureAttachments();const meta=state.allegati[docId];if(!meta)return`<span class="small">Nessun allegato</span>`;return`<span class="badge ok">allegato</span><span class="attach-meta">${esc(meta.name)} · ${humanFileSize(meta.size)} · ${esc((meta.updatedAt||"").slice(0,10))}</span>`;}
function attachmentActions(docId){ensureAttachments();if(!state.allegati[docId])return"";return`<button class="action secondary mini" onclick="openAttachment('${esc(docId)}')">Apri</button><button class="action secondary mini" onclick="downloadAttachment('${esc(docId)}')">Scarica</button><button class="action danger mini" onclick="confirmRemoveAttachment('${esc(docId)}')">Rimuovi</button>`;}
function promptAttach(docId){pendingAttachDocId=docId;document.getElementById("attachDocInput").click();}
async function handleAttachFile(event){const file=event.target.files&&event.target.files[0];event.target.value="";if(!file||!pendingAttachDocId)return;ensureAttachments();await putStoredFile(pendingAttachDocId,file);state.allegati[pendingAttachDocId]={name:file.name,size:file.size,type:file.type||"application/octet-stream",updatedAt:new Date().toISOString()};setDirty(true);saveNow();renderView(document.querySelector("section.view.active")?.id||"documenti");toast("File allegato al documento.");pendingAttachDocId=null;}
function openFileDb(){return new Promise((resolve,reject)=>{const req=indexedDB.open(FILE_DB_NAME,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(FILE_STORE))db.createObjectStore(FILE_STORE,{keyPath:"docId"});};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});}
async function putStoredFile(docId,file){const db=await openFileDb();return new Promise((resolve,reject)=>{const tx=db.transaction(FILE_STORE,"readwrite");tx.objectStore(FILE_STORE).put({docId,file,name:file.name,type:file.type,size:file.size,updatedAt:new Date().toISOString()});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error);});}
async function getStoredFile(docId){const db=await openFileDb();return new Promise((resolve,reject)=>{const tx=db.transaction(FILE_STORE,"readonly");const req=tx.objectStore(FILE_STORE).get(docId);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error);});}
async function deleteStoredFile(docId){const db=await openFileDb();return new Promise((resolve,reject)=>{const tx=db.transaction(FILE_STORE,"readwrite");tx.objectStore(FILE_STORE).delete(docId);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error);});}
async function openAttachment(docId){const rec=await getStoredFile(docId);if(!rec||!rec.file)return alert("Allegato non trovato in questo browser.");const url=URL.createObjectURL(rec.file);window.open(url,"_blank");setTimeout(()=>URL.revokeObjectURL(url),30000);}
async function downloadAttachment(docId){const rec=await getStoredFile(docId);if(!rec||!rec.file)return alert("Allegato non trovato in questo browser.");downloadBlob(rec.file,rec.name||"allegato");}
async function removeAttachmentConfirmed(docId){ensureAttachments();delete state.allegati[docId];await deleteStoredFile(docId);setDirty(true);saveNow();closeModal();renderView(document.querySelector("section.view.active")?.id||"documenti");}

/* MGR-023 native DOCX + dynamic ZIP attachments */
function zipTextEncoder(){return new TextEncoder();}
function zipTextDecoder(){return new TextDecoder("utf-8");}
function bytesFromText(text){return zipTextEncoder().encode(String(text ?? ""));}
function bytesToText(bytes){return zipTextDecoder().decode(bytes);}

 const manifest={schema:"manager-curricolo-complete-attachment-package",schemaVersion:"1.0",generatedAt:new Date().toISOString(),stateFile,istituto:state.istituto||{},attachments:publicAttachmentManifest(collected.items),missing:collected.missing,instructions:"Importare questo ZIP con Importa pacchetto ZIP. Ripristina stato Manager e allegati reali salvati in IndexedDB."};
 const entries=[
  {path:"MANIFESTO_PACCHETTO_DOCUMENTI.json",data:JSON.stringify(manifest,null,2)},
  {path:stateFile,data:JSON.stringify(portableSessionEnvelope(),null,2)},
  {path:"registro_documenti.csv",data:toCsv(state.documenti||[])},
  {path:"README_IMPORTAZIONE.txt",data:"Pacchetto completo Manager Curricolo. Contiene stato JSON, registro documenti CSV e allegati reali. Importare dal Manager con il pulsante Importa pacchetto ZIP."},
  ...collected.items.map(a=>({path:a.path,data:a.data}))
 ];
 const blob=await buildZipBlob(entries);
 downloadBlob(blob,makePackageFilename("pacchetto_completo_manager_curricolo"));
 toast(`Pacchetto completo ZIP esportato: ${collected.items.length} allegati inclusi.`);
 if(collected.missing.length)alert(`Attenzione: ${collected.missing.length} allegati risultano registrati ma non trovati in questo browser.`);
}
async function importCompleteAttachmentPackage(event){
 const file=event.target.files&&event.target.files[0];event.target.value="";if(!file)return;
 try{
  const entries=await readStoredZipEntries(file);
  const manifestBytes=entries["MANIFESTO_PACCHETTO_DOCUMENTI.json"];
  if(!manifestBytes)throw new Error("Manifesto pacchetto non trovato. Usa un Pacchetto completo ZIP generato dal Manager.");
  const manifest=JSON.parse(bytesToText(manifestBytes));
  if(manifest.schema!=="manager-curricolo-complete-attachment-package")throw new Error("Schema pacchetto non compatibile.");
  const stateBytes=entries[manifest.stateFile||"stato_manager_curricolo.json"];
  if(!stateBytes)throw new Error("Stato Manager non trovato nel pacchetto.");
  const parsed=JSON.parse(bytesToText(stateBytes));
  const imported=(parsed.schema==="manager-curricolo-portable-session"||parsed.modello==="manager-curricolo-portable-session")?parsed.state:parsed;
  if(!imported.istituto||!imported.ordiniScuola||!imported.discipline)throw new Error("Stato Manager non compatibile.");
  state=imported;ensureRuntimeDefaults();ensureScopeDefaults();ensureAttachments();
  let restored=0;const missing=[];
  for(const a of manifest.attachments||[]){
   const bytes=entries[a.path];
   if(!bytes){missing.push(a.originalName||a.path);continue;}
   const blob=new Blob([bytes],{type:a.type||"application/octet-stream"});
   const fileObj=new File([blob],a.originalName||"allegato",{type:a.type||"application/octet-stream",lastModified:Date.parse(a.updatedAt)||Date.now()});
   await putStoredFile(a.docId,fileObj);
   state.allegati[a.docId]={name:a.originalName||"allegato",size:blob.size,type:a.type||"application/octet-stream",updatedAt:a.updatedAt||new Date().toISOString()};
   restored++;
  }
  saveNow("manual");renderAll();toast(`Pacchetto importato: ${restored} allegati ripristinati.`);
  if(missing.length)alert(`Pacchetto importato, ma ${missing.length} allegati non sono stati trovati nello ZIP: ${missing.slice(0,5).join(", ")}`);
 }catch(e){alert("Import pacchetto ZIP fallito: "+e.message);}
}

async function exportDocument(scope, mode){
 if(mode==="docx"){
  const blob=await createDocxBlob(scope);
  downloadBlob(blob, makeExportDocumentFilename(scope,"docx"));
  toast("Documento DOCX nativo esportato.");
  return;
 }
 const html=buildPrintableHtml(scope);
 if(mode==="word"){
  const wordHtml='\ufeff'+html;
  downloadBlob(new Blob([wordHtml],{type:"application/msword;charset=utf-8"}), makeExportDocumentFilename(scope,"doc"));
  toast("Documento Word-compatible esportato.");
  return;
 }
 const w=window.open("","_blank");
 if(!w){
  downloadBlob(new Blob([html],{type:"text/html;charset=utf-8"}), makeExportDocumentFilename(scope,"html"));
  alert("Il popup di stampa è stato bloccato. Ho scaricato un file HTML: aprilo e usa Stampa → Salva come PDF.");
  return;
 }
 w.document.open();
 w.document.write(html);
 w.document.close();
 w.focus();
 setTimeout(()=>w.print(),350);
 toast("Anteprima di stampa aperta. Per il PDF scegli Salva come PDF.");
}

function portableSessionEnvelope(){
 return {
  modello:"manager-curricolo-portable-session",
  schemaVersion:"1.0",
  generatedAt:new Date().toISOString(),
  locale: state.locale || "it-IT",
  storageKey: STORAGE_KEY,
  instructions:"Importare questo file nel Manager Curricolo su un altro PC tramite Importa backup/sessione.",
  state
 };
}
function makePortableSessionFilename(){
 const istituto=safeId(state.istituto?.codiceMeccanografico || state.istituto?.denominazione || "istituto");
 const stamp=new Date().toISOString().slice(0,16).replace(/[-:T]/g,"");
 return `sessione_curricolo_${istituto}_${stamp}.json`;
}
function exportPortableSession(){
 saveNow("manual");
 const envelope=portableSessionEnvelope();
 downloadBlob(new Blob([JSON.stringify(envelope,null,2)],{type:"application/json;charset=utf-8"}), makePortableSessionFilename());
 toast("Sessione esportata: puoi copiarla su altro PC o inviarla al referente.");
}

function exportJson(){downloadBlob(new Blob([JSON.stringify(state,null,2)],{type:"application/json;charset=utf-8"}),state.impostazioniExport?.nomiFile?.backupJson||"backup_manager_curricolo_istituto_v2.json");}
function importJson(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=()=>{
  try{
   const parsed=JSON.parse(reader.result);
   const imported = (parsed.schema === "manager-curricolo-portable-session" || parsed.modello === "manager-curricolo-portable-session") ? parsed.state : parsed;
   if(!imported.istituto||!imported.ordiniScuola||!imported.discipline)throw new Error("JSON non compatibile con il modello del Manager.");
   state=imported;
   ensureRuntimeDefaults();
   saveNow("manual");
   renderAll();
   toast("Sessione/JSON importato correttamente.");
  }catch(e){alert("Importazione fallita: "+e.message);}
 };
 reader.readAsText(file,"utf-8");
 event.target.value="";
}
function downloadCsv(kind){const rows=kind==="matrice"?(state.matriciRevisione||[]):(state.documenti||[]), name=kind==="matrice"?(state.impostazioniExport?.nomiFile?.matriceCsv||"matrice_revisione_curricolo.csv"):(state.impostazioniExport?.nomiFile?.registroDocumentiCsv||"registro_documenti_curricolo.csv");downloadBlob(new Blob([toCsv(rows)],{type:"text/csv;charset=utf-8"}),name);}
function toCsv(rows){if(!rows.length)return"";const keys=Array.from(rows.reduce((s,r)=>{Object.keys(r).forEach(k=>s.add(k));return s;},new Set()));const c=v=>{if(Array.isArray(v))v=v.join("|");if(typeof v==="object"&&v!==null)v=JSON.stringify(v);v=String(v??"");return /[",\n;]/.test(v)?`"${v.replace(/"/g,'""')}"`:v;};return[keys.join(";")].concat(rows.map(r=>keys.map(k=>c(r[k])).join(";"))).join("\n");}
function downloadBlob(blob,filename){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);}
function validateState(){const errors=[], orderIds=new Set((state.ordiniScuola||[]).map(o=>o.id).concat(["trasversale"])), discIds=new Set((state.discipline||[]).map(d=>d.id));for(const d of state.discipline||[])if(!orderIds.has(d.ordine))errors.push(`Disciplina ${d.id} con ordine non valido: ${d.ordine}`);for(const doc of state.documenti||[])if(!doc.id||!doc.titolo||!doc.tipo||!doc.ambito||!doc.versione||!doc.stato)errors.push(`Documento incompleto: ${doc.id||doc.titolo||"senza id"}`);for(const r of state.matriciRevisione||[]){if(!orderIds.has(r.ordine))errors.push(`Matrice ${r.id} con ordine non valido`);if(!discIds.has(r.disciplinaCampo))errors.push(`Matrice ${r.id} con disciplina/campo non valido`);if(!r.stato)errors.push(`Matrice ${r.id} senza stato`);}for(const f of state.fontiGenerali||[]){const hay=`${f.titolo} ${f.noteUso||""} ${f.fileLocale||""}`.toLowerCase();if(hay.includes("tecnologia"))errors.push(`Fonte generale contiene riferimento specifico a Tecnologia: ${f.id}`);}return{errors};}

ensureRuntimeDefaults();
ensureScopeDefaults();
updateSaveUi('saved');
renderAll();
</script>
